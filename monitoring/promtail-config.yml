server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: mn-bot
    static_configs:
      - targets:
          - localhost
        labels:
          app: mn-bot
          __path__: /logs/mn-bot.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            timestamp: timestamp
      - labels:
          level:
          event:
      - timestamp:
          source: timestamp
          format: RFC3339
